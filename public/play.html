<!DOCTYPE html>
<html>
<head>
<title>Chess</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.12.0/chess.min.js"></script>

<style>

body{
margin:0;
background:#302e2b;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
color:white;
}

.container{
display:flex;
gap:25px;
flex-wrap:wrap;
justify-content:center;
}

.board-area{
display:flex;
flex-direction:column;
align-items:center;
}

.captured{
display:flex;
gap:5px;
font-size:22px;
min-height:28px;
}

.chessboard{
width:480px;
height:480px;
display:grid;
grid-template-columns:repeat(8,1fr);
grid-template-rows:repeat(8,1fr);
border:4px solid black;
}

.square{
display:flex;
justify-content:center;
align-items:center;
font-size:44px;
cursor:pointer;
}

.light{background:#EEEED2;}
.dark{background:#769656;}

.highlight{
box-shadow: inset 0 0 0 4px yellow;
}

.selected{
box-shadow: inset 0 0 0 4px #00aaff;
}

.check{
background:#b33a3a !important;
}

.white-piece{
color:white;
-webkit-text-stroke:1px black;
}

.black-piece{
color:black;
}

.side{
display:flex;
flex-direction:column;
align-items:center;
gap:12px;
}

.timer{
background:#1f1f1f;
padding:12px;
width:140px;
font-size:24px;
text-align:center;
border-radius:6px;
}

.active{
background:#3a3a3a;
}

.moves{
background:#1f1f1f;
width:180px;
height:200px;
overflow-y:auto;
padding:10px;
font-size:14px;
border-radius:6px;
}

button{
padding:6px 10px;
font-size:12px;
border:none;
border-radius:4px;
cursor:pointer;
}

.undo{background:#444;color:white;}
.resign{background:#8b2a2a;color:white;}
.flip{background:#2a4f8b;color:white;}
.pgn{background:#2a8b4f;color:white;}

#status{font-size:14px;}

@media(max-width:700px){
.chessboard{
width:90vw;
height:90vw;
}
.container{
flex-direction:column;
}
}

</style>
</head>

<body>

<div class="container">

<div class="board-area">

<div id="capturedBlack" class="captured"></div>
<div id="board" class="chessboard"></div>
<div id="capturedWhite" class="captured"></div>

</div>

<div class="side">

<div id="blackTimer" class="timer">05:00</div>

<div id="moves" class="moves"></div>

<button class="undo" onclick="undoMove()">Undo</button>
<button class="resign" onclick="resign()">Resign</button>
<button class="flip" onclick="flipBoard()">Flip</button>
<button class="pgn" onclick="exportPGN()">Export PGN</button>

<div id="whiteTimer" class="timer active">05:00</div>

<div id="status">White to move</div>

</div>

</div>

<script>

const board=document.getElementById("board")
const game=new Chess()

const status=document.getElementById("status")
const movesDiv=document.getElementById("moves")

const capturedWhite=document.getElementById("capturedWhite")
const capturedBlack=document.getElementById("capturedBlack")

const whiteTimer=document.getElementById("whiteTimer")
const blackTimer=document.getElementById("blackTimer")

let selected=null
let legalMoves=[]
let flipped=false

let whiteTime=300
let blackTime=300
let timer=null
let started=false

let capturedWhitePieces=[]
let capturedBlackPieces=[]

const moveSound=new Audio("https://www.soundjay.com/buttons/sounds/button-16.mp3")
const captureSound=new Audio("https://www.soundjay.com/buttons/sounds/button-09.mp3")
const checkSound=new Audio("https://www.soundjay.com/buttons/sounds/beep-07.mp3")

const symbols={
wp:"♙",wr:"♖",wn:"♘",wb:"♗",wq:"♕",wk:"♔",
bp:"♟",br:"♜",bn:"♞",bb:"♝",bq:"♛",bk:"♚"
}

function formatTime(t){
let m=Math.floor(t/60)
let s=t%60
return m+":"+s.toString().padStart(2,"0")
}

function updateTimers(){
whiteTimer.textContent=formatTime(whiteTime)
blackTimer.textContent=formatTime(blackTime)
}

function startTimer(){

if(timer) return

timer=setInterval(()=>{

if(game.turn()==="w"){
whiteTime=Math.max(0,whiteTime-1)
if(whiteTime===0){
status.textContent="White loses on time. Black wins."
clearInterval(timer)
}
}else{
blackTime=Math.max(0,blackTime-1)
if(blackTime===0){
status.textContent="Black loses on time. White wins."
clearInterval(timer)
}
}

updateTimers()

},1000)

}

function drawBoard(){

board.innerHTML=""

let ranks=[8,7,6,5,4,3,2,1]
let files=["a","b","c","d","e","f","g","h"]

if(flipped){
ranks.reverse()
files.reverse()
}

for(let r of ranks){
for(let f of files){

let coord=f+r

let square=document.createElement("div")

let rIndex=ranks.indexOf(r)
let cIndex=files.indexOf(f)

square.className="square "+((rIndex+cIndex)%2?"dark":"light")

square.dataset.square=coord

let piece=game.get(coord)

if(piece){

square.textContent=symbols[piece.color+piece.type]

if(piece.color==="w"){
square.classList.add("white-piece")
}else{
square.classList.add("black-piece")
}

if(game.in_check() && piece.type==="k" && piece.color===game.turn()){
square.classList.add("check")
}

}

if(selected===coord){
square.classList.add("selected")
}

if(legalMoves.includes(coord)){
square.classList.add("highlight")
}

square.onclick=handleClick

board.appendChild(square)

}
}

updateStatus()

}

function promotionChoice(){

let p=prompt("Promote to: q,r,b,n","q")

if(!p) return "q"

p=p.toLowerCase()

if(["q","r","b","n"].includes(p)) return p

return "q"

}

function handleClick(){

let square=this.dataset.square

if(selected===null){

let piece=game.get(square)

if(piece && piece.color===game.turn()){

selected=square

legalMoves=game.moves({
square:square,
verbose:true
}).map(m=>m.to)

drawBoard()

}

}else{

let promotion="q"

let piece=game.get(selected)

if(piece.type==="p" && (square[1]==="8" || square[1]==="1")){
promotion=promotionChoice()
}

let move=game.move({
from:selected,
to:square,
promotion:promotion
})

selected=null
legalMoves=[]

if(move){

if(move.captured){

captureSound.play()

if(move.color==="w")
capturedWhitePieces.push(move.captured)
else
capturedBlackPieces.push(move.captured)

updateCaptured()

}else{
moveSound.play()
}

if(game.in_check()) checkSound.play()

if(!started){
started=true
startTimer()
}

updateMoves()

}

drawBoard()

}

}

function updateCaptured(){

capturedWhite.innerHTML=""
capturedBlack.innerHTML=""

capturedWhitePieces.forEach(p=>{
let s=document.createElement("span")
s.textContent=symbols["b"+p]
capturedWhite.appendChild(s)
})

capturedBlackPieces.forEach(p=>{
let s=document.createElement("span")
s.textContent=symbols["w"+p]
capturedBlack.appendChild(s)
})

}

function updateMoves(){

let history=game.history()
let text=""

for(let i=0;i<history.length;i++){

if(i%2===0) text+=(Math.floor(i/2)+1)+". "

text+=history[i]+" "

}

movesDiv.textContent=text

}

function undoMove(){

let m=game.undo()

if(!m) return

if(m.captured){

if(m.color==="w")
capturedWhitePieces.pop()
else
capturedBlackPieces.pop()

updateCaptured()

}

if(game.history().length===0){
started=false
clearInterval(timer)
timer=null
}

drawBoard()
updateMoves()

}

function resign(){

clearInterval(timer)

if(game.turn()==="w")
status.textContent="White resigned. Black wins."
else
status.textContent="Black resigned. White wins."

}

function flipBoard(){
flipped=!flipped
drawBoard()
}

function exportPGN(){

let pgn=game.pgn()

navigator.clipboard.writeText(pgn)

alert("PGN copied to clipboard!")

}

function updateStatus(){

if(game.in_checkmate()){

clearInterval(timer)

if(game.turn()==="w")
status.textContent="Checkmate! Black wins."
else
status.textContent="Checkmate! White wins."

return
}

if(game.in_draw()){
status.textContent="Draw"
return
}

status.textContent=game.turn()==="w"?"White to move":"Black to move"

whiteTimer.classList.toggle("active",game.turn()==="w")
blackTimer.classList.toggle("active",game.turn()==="b")

}

updateTimers()
drawBoard()

</script>

</body>
</html>
