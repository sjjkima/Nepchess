<!DOCTYPE html>
<html>

<head>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Tournaments</h1>

<button onclick="create()">Create Tournament</button>

<div id="list"></div>

<script>

async function create(){

const name = prompt("Tournament name")

await fetch("/createTournament",{
method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({name})
})

load()

}

async function load(){

const res = await fetch("/tournaments")
const data = await res.json()

document.getElementById("list").innerHTML=
JSON.stringify(data)

}

load()

</script>

</body>
</html>
