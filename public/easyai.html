<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NepChess | Play Chess Online</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.12.0/chess.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
*{
-webkit-tap-highlight-color: transparent;
}

body{
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#0f0f23 0%,#1a1a2e 50%,#16213e 100%);
color:white;
min-height:100vh;
}

.back-btn{
    position:absolute;
    top:20px;
    left:20px;
    padding:10px 18px;
    font-size:16px;
    border:none;
    border-radius:8px;
    background:#4CAF50;
    color:white;
    cursor:pointer;
}

.back-btn:hover{
    background:#45a049;
}

.container{
display:flex;
gap:25px;
flex-wrap:wrap;
justify-content:center;
padding:80px 20px;
}

/* BOARD */

.chessboard{
width:min(90vw,480px);
height:min(90vw,480px);
display:grid;
grid-template-columns:repeat(8,1fr);
grid-template-rows:repeat(8,1fr);
border:5px solid #2ecc71;
border-radius:20px;
touch-action:manipulation;
}

.square{
display:flex;
justify-content:center;
align-items:center;
cursor:pointer;
}

.square img{
width:85%;
height:85%;
pointer-events:none;
touch-action:none;
}

.light{background:#f0d9b5;}
.dark{background:#769656;}

.highlight{
background:rgba(255,255,0,0.6)!important;
}

.selected{
background:rgba(46,204,113,0.6)!important;
}

/* SIDE PANEL */

.side{
display:flex;
flex-direction:column;
gap:12px;
width:220px;
}

.timer{
padding:15px;
font-size:28px;
text-align:center;
border-radius:10px;
border:2px solid #2ecc71;
}

.moves{
height:200px;
overflow-y:auto;
background:rgba(255,255,255,0.05);
padding:10px;
font-family:monospace;
}

.check {
background: rgba(231, 76, 60, 0.7) !important;
}

button{
padding:8px 12px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:600;
}

.undo{background:#2ecc71;color:white;}
.redo{background:#2ecc71;color:white;}
.resign{background:#e74c3c;color:white;}
.flip{background:#3498db;color:white;}
.pgn{background:#9b59b6;color:white;}

.controls{
display:flex;
gap:6px;
}

#status{
font-size:18px;
text-align:center;
margin-top:5px;
}

#thinking{
color:#2ecc71;
font-size:14px;
height:20px;
}

/* WIN MODAL */

#winMessage{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
display:none;
background:rgba(0,0,0,0.9);
align-items:center;
justify-content:center;
flex-direction:column;
font-size:40px;
}

#winMessage button{
margin-top:20px;
padding:15px 40px;
font-size:18px;
background:#2ecc71;
color:white;
}

/* PROMOTION POPUP */

#promotionPopup{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
display:none;
background:rgba(0,0,0,0.9);
align-items:center;
justify-content:center;
}

#promotionPopup div{
display:flex;
gap:20px;
background:#111;
padding:30px;
border-radius:15px;
}

#promotionPopup img{
width:80px;
cursor:pointer;
}

@media (max-width:700px){

.container{
flex-direction:column;
align-items:center;
padding:20px;
}

.side{
width:100%;
max-width:480px;
}

.timer{
font-size:22px;
}

button{
padding:10px;
font-size:14px;
}

.moves{
height:140px;
}

}
</style>
</head>

<body>
<button class="back-btn" onclick="window.location.href='index.html'">⬅ Back</button>
<div id="winMessage">
<div id="winText"></div>
<button onclick="newGame()">New Game</button>
</div>

<div id="promotionPopup">
<div>
<img onclick="choosePromotion('q')">
<img onclick="choosePromotion('r')">
<img onclick="choosePromotion('b')">
<img onclick="choosePromotion('n')">
</div>
</div>

<div class="container">

<div id="board" class="chessboard"></div>

<div class="side">

<div id="blackTimer" class="timer">05:00</div>
<div id="thinking"></div>

<div id="moves" class="moves"></div>

<div class="controls">
<button class="undo" onclick="undoMove()">Undo</button>
<button class="redo" onclick="redoMove()">Redo</button>
<button class="resign" onclick="resign()">Resign</button>
</div>

<button class="flip" onclick="flipBoard()">Flip Board</button>
<button class="pgn" onclick="exportPGN()">Copy PGN</button>

<div id="whiteTimer" class="timer">05:00</div>

<div id="status">White to move</div>

</div>
</div>

<script>

/* CORE */
/* SOUNDS */

const moveSound = new Audio("https://images.chesscomfiles.com/chess-themes/sounds/_MP3_/default/move-self.mp3")
const captureSound = new Audio("https://images.chesscomfiles.com/chess-themes/sounds/_MP3_/default/capture.mp3")
const checkSound = new Audio("https://images.chesscomfiles.com/chess-themes/sounds/_MP3_/default/move-check.mp3")

const boardEl=document.getElementById("board")
const game=new Chess()

const statusEl=document.getElementById("status")
const movesDiv=document.getElementById("moves")
const thinkingEl=document.getElementById("thinking")

const whiteTimerEl=document.getElementById("whiteTimer")
const blackTimerEl=document.getElementById("blackTimer")

let selected=null
let legalMoves=[]
let flipped=false
let lastMove=null

let whiteTime=300
let blackTime=300

let timerInterval=null
let gameStarted=false
let gameOver=false

let aiColor="b"
let aiThinking=false
let stockfish=null

let moveHistory=[]
let redoStack=[]

let pendingPromotion=null

/* PIECES */

const pieces={
wp:"https://upload.wikimedia.org/wikipedia/commons/4/45/Chess_plt45.svg",
wr:"https://upload.wikimedia.org/wikipedia/commons/7/72/Chess_rlt45.svg",
wn:"https://upload.wikimedia.org/wikipedia/commons/7/70/Chess_nlt45.svg",
wb:"https://upload.wikimedia.org/wikipedia/commons/b/b1/Chess_blt45.svg",
wq:"https://upload.wikimedia.org/wikipedia/commons/1/15/Chess_qlt45.svg",
wk:"https://upload.wikimedia.org/wikipedia/commons/4/42/Chess_klt45.svg",

bp:"https://upload.wikimedia.org/wikipedia/commons/c/c7/Chess_pdt45.svg",
br:"https://upload.wikimedia.org/wikipedia/commons/f/ff/Chess_rdt45.svg",
bn:"https://upload.wikimedia.org/wikipedia/commons/e/ef/Chess_ndt45.svg",
bb:"https://upload.wikimedia.org/wikipedia/commons/9/98/Chess_bdt45.svg",
bq:"https://upload.wikimedia.org/wikipedia/commons/4/47/Chess_qdt45.svg",
bk:"https://upload.wikimedia.org/wikipedia/commons/f/f0/Chess_kdt45.svg"
}

/* STOCKFISH */

async function initStockfish(){

const response=await fetch('https://cdnjs.cloudflare.com/ajax/libs/stockfish.js/10.0.0/stockfish.js')
const text=await response.text()

const blob=new Blob([text],{type:'application/javascript'})
const url=URL.createObjectURL(blob)

stockfish=new Worker(url)

stockfish.onmessage=function(event){

const line=event.data

if(line.startsWith("bestmove")){

const moveStr=line.split(" ")[1]

game.move({
from:moveStr.substring(0,2),
to:moveStr.substring(2,4),
promotion:"q"
})

lastMove=[moveStr.substring(0,2),moveStr.substring(2,4)]

aiThinking=false
thinkingEl.textContent=""

updateMoves()
drawBoard()
updateStatus()

}

}

}

/* DRAW BOARD */

function drawBoard(){

boardEl.innerHTML=""

let ranks=[8,7,6,5,4,3,2,1]
let files=["a","b","c","d","e","f","g","h"]

if(flipped){
ranks.reverse()
files.reverse()
}

for(let r of ranks){

for(let f of files){

let coord=f+r

let square=document.createElement("div")

let rIndex=ranks.indexOf(r)
let cIndex=files.indexOf(f)

square.className="square "+((rIndex+cIndex)%2?"dark":"light")

square.dataset.square=coord

let piece=game.get(coord)

if(piece){

let img=document.createElement("img")
img.src=pieces[piece.color+piece.type]

square.appendChild(img)

}

if(selected===coord) square.classList.add("selected")
if(legalMoves.includes(coord)) square.classList.add("highlight")

square.onclick=handleClick

boardEl.appendChild(square)

}

}

}

/* CLICK */

function handleClick(){

if(gameOver||aiThinking)return

let square=this.dataset.square
let piece=game.get(square)

if(selected===null){

if(piece && piece.color===game.turn()){
selectPiece(square)
}

return

}

/* switch piece instantly */

if(piece && piece.color===game.turn()){
selectPiece(square)
return
}

/* promotion detection */

let selectedPiece=game.get(selected)

if(selectedPiece.type==="p" && (square[1]==="8" || square[1]==="1")){

pendingPromotion={from:selected,to:square}

showPromotionPopup(selectedPiece.color)

selected=null
legalMoves=[]

drawBoard()

return
}

let move=game.move({
from:selected,
to:square
})

if(move===null){

selected=null
legalMoves=[]
drawBoard()

return

}

selected=null
legalMoves=[]

lastMove=[move.from,move.to]

moveHistory.push(game.fen())
redoStack=[]

updateMoves()

if(!gameStarted){
startTimer()
gameStarted=true
}

drawBoard()
updateStatus()

setTimeout(makeAIMove,250)

}

function selectPiece(square){

selected=square

let moves=game.moves({
square:square,
verbose:true
})

legalMoves=moves.map(m=>m.to)

drawBoard()

}

/* PROMOTION */

function showPromotionPopup(color){

const popup=document.getElementById("promotionPopup")

const imgs=popup.querySelectorAll("img")

imgs[0].src=pieces[color+"q"]
imgs[1].src=pieces[color+"r"]
imgs[2].src=pieces[color+"b"]
imgs[3].src=pieces[color+"n"]

popup.style.display="flex"

}

function choosePromotion(piece){

document.getElementById("promotionPopup").style.display="none"

const move=game.move({
from:pendingPromotion.from,
to:pendingPromotion.to,
promotion:piece
})

pendingPromotion=null

moveHistory.push(game.fen())
redoStack=[]

updateMoves()
drawBoard()
updateStatus()

setTimeout(makeAIMove,250)

}

/* AI */

function makeAIMove(){

if(game.turn() !== aiColor || gameOver) return

aiThinking = true
thinkingEl.textContent = "AI thinking..."

setTimeout(()=>{

let moves = game.moves({verbose:true})

/* 80% random move (very weak) */
let move

if(Math.random() < 0.8){

move = moves[Math.floor(Math.random()*moves.length)]

}else{

/* 20% slightly reasonable move */
let captures = moves.filter(m => m.captured)

if(captures.length > 0)
move = captures[Math.floor(Math.random()*captures.length)]
else
move = moves[Math.floor(Math.random()*moves.length)]

}

game.move(move)

lastMove = [move.from, move.to]

aiThinking = false
thinkingEl.textContent = ""

updateMoves()
drawBoard()
updateStatus()

},700)

}

/* TIMER */

function startTimer(){

timerInterval=setInterval(()=>{

if(game.turn()==="w"){

whiteTime--

if(whiteTime<=0)
endGame("Black wins on time")

}else{

blackTime--

if(blackTime<=0)
endGame("White wins on time")

}

updateClock()

},1000)

}

function updateClock(){

whiteTimerEl.textContent=formatTime(whiteTime)
blackTimerEl.textContent=formatTime(blackTime)

}

function formatTime(seconds){

let m=Math.floor(seconds/60)
let s=seconds%60

return String(m).padStart(2,"0")+":"+String(s).padStart(2,"0")

}

/* MOVES */

function updateMoves(){

let history=game.history()

let text=""

for(let i=0;i<history.length;i++){

if(i%2===0)
text+=(Math.floor(i/2)+1)+". "+history[i]+" "
else
text+=history[i]+"\n"

}

movesDiv.textContent=text

}

/* CONTROLS */

function undoMove(){

if(moveHistory.length===0)return

redoStack.push(game.fen())

let fen=moveHistory.pop()

game.load(fen)

drawBoard()
updateMoves()

}

function redoMove(){

if(redoStack.length===0)return

moveHistory.push(game.fen())

let fen=redoStack.pop()

game.load(fen)

drawBoard()
updateMoves()

}

function updateStatus(){

if(game.in_checkmate()){

let winner=game.turn()==="w"?"Black":"White"

endGame(winner+" wins by checkmate")

return

}

if(game.in_draw()){

endGame("Draw")

return

}

let turn=game.turn()==="w"?"White":"Black"

statusEl.textContent=turn+" to move"

}

function resign(){

let winner=game.turn()==="w"?"Black":"White"

endGame(winner+" wins by resignation")

}

function flipBoard(){

flipped=!flipped

drawBoard()

}

function exportPGN(){

navigator.clipboard.writeText(game.pgn())

alert("PGN copied!")

}

function endGame(text){

gameOver=true

clearInterval(timerInterval)

document.getElementById("winText").textContent=text

document.getElementById("winMessage").style.display="flex"

}

function newGame(){

game.reset()

moveHistory=[]
redoStack=[]

selected=null
legalMoves=[]

whiteTime=300
blackTime=300

gameOver=false
gameStarted=false

updateClock()
updateMoves()
drawBoard()
updateStatus()

document.getElementById("winMessage").style.display="none"

}

/* INIT */

initStockfish()

drawBoard()
updateClock()
updateStatus()

</script>

</body>
</html>
