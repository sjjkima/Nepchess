<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NepChess | Play Chess Online</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet">

<!-- Chess.js for game logic -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.12.0/chess.min.js"></script>

<style>
/* Reset and body */
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg,#0f0f23 0%,#1a1a2e 50%,#16213e 100%);
  color:white;
  overflow-x:hidden;
  position:relative;
  min-height:100vh;
}

/* Particle Background */
#particles{
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  pointer-events:none;
  z-index:0;
}

/* Navbar */
.navbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 60px;
  background: rgba(15,15,35,0.95);
  backdrop-filter: blur(15px);
  position:fixed;
  width:100%;
  z-index:1000;
  box-shadow: 0 5px 25px rgba(0,0,0,0.5);
}
.navbar .logo{
  font-size:32px;
  font-weight:900;
  color:#2ecc71;
}
.nav-links a{
  margin-right:30px;
  text-decoration:none;
  color:white;
  font-weight:600;
  font-size:18px;
  transition:0.3s;
}
.nav-links a:hover{color:#2ecc71;}
.nav-links .login{
  padding:8px 20px;
  background:#2ecc71;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:600;
}

/* Main Game Container */
.game-container{
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  padding:100px 20px 20px 20px;
  z-index:1;
  position:relative;
}

/* Board Area */
.board-area{
  display:flex;
  flex-direction:column;
  align-items:center;
}

.chessboard{
  width:480px;
  height:480px;
  display:grid;
  grid-template-columns:repeat(8,1fr);
  grid-template-rows:repeat(8,1fr);
  border:5px solid #2ecc71;
  border-radius:20px;
  box-shadow:0 0 50px rgba(0,0,0,0.7);
  user-select: none;
}

.square{
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
  position: relative;
}

.square img{
  width:85%;
  height:85%;
  pointer-events:none;
  filter: drop-shadow(1px 1px 1px rgba(0,0,0,0.5));
}

.light{background:#f0d9b5;}
.dark{background:#769656;}

.highlight{
  background-color: rgba(46,204,113,0.5) !important;
}

.selected{
  background-color: rgba(46,204,113,0.7) !important;
}

/* Side Panel */
.side{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:15px;
  width: 250px;
  background: rgba(255,255,255,0.05);
  padding:25px;
  border-radius:20px;
  backdrop-filter:blur(10px);
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.timer{
  background: rgba(15,15,35,0.9);
  padding:15px;
  width:100%;
  font-size:28px;
  text-align:center;
  border-radius:10px;
  font-weight: bold;
  border: 2px solid #2ecc71;
  box-shadow: 0 5px 15px rgba(46,204,113,0.2);
}

.moves{
  background: rgba(15,15,35,0.9);
  width:100%;
  height:200px;
  overflow-y:auto;
  overflow-x:hidden;
  padding:15px;
  font-size:14px;
  border-radius:10px;
  box-sizing: border-box;
  font-family: monospace;
  line-height: 1.5;
  white-space: pre-wrap;
  word-wrap: break-word;
  border: 1px solid rgba(46,204,113,0.3);
}

button{
  padding:10px 15px;
  font-size:14px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  transition: all 0.3s;
  font-weight:600;
}

button:hover{transform:translateY(-3px);}
button:disabled{opacity: 0.5; cursor: not-allowed; transform:none;}

.undo{background:#2ecc71;color:white;}
.redo{background:#2ecc71;color:white;}
.resign{background:#e74c3c;color:white;}
.flip{background:#3498db;color:white;}
.pgn{background:#9b59b6;color:white;}

.controls{
  display:flex;
  gap:8px;
  width: 100%;
  justify-content: center;
  flex-wrap: wrap;
}

#status{
  margin-top: 10px;
  font-size: 16px;
  color: #2ecc71;
  font-weight: 600;
}

.thinking-indicator {
    color: #2ecc71;
    font-size: 14px;
    height: 20px;
    font-weight: 600;
}

/* Win Message Modal */
#winMessage{
  position:fixed;
  top:0;
  left:0;
  right:0;
  bottom:0;
  display:none;
  background:rgba(15,15,35,0.95);
  align-items:center;
  justify-content:center;
  font-size:40px;
  z-index:1000;
  text-align:center;
  flex-direction: column;
  backdrop-filter: blur(10px);
}

#winMessage button{
  margin-top:20px;
  padding:15px 40px;
  font-size:18px;
  background:#2ecc71;
}

/* Scrollbar Styling */
::-webkit-scrollbar{width:8px;}
::-webkit-scrollbar-track{background:rgba(15,15,35,0.5);}
::-webkit-scrollbar-thumb{background:#2ecc71;border-radius:4px;}
::-webkit-scrollbar-thumb:hover{background:#27ae60;}

/* Responsive */
@media (max-width:1200px){
  .game-container{flex-direction:column;gap:30px;}
  .side{width:100%;max-width:400px;}
}
@media (max-width:768px){
  .chessboard{width:350px;height:350px;}
  .side{width:100%;}
  .navbar{padding:15px 20px;}
  .nav-links{display:none;}
}
</style>
</head>
<body>

<!-- Particle Canvas -->
<canvas id="particles"></canvas>

<!-- Navbar -->
<nav class="navbar">
  <div class="logo">♟ NepChess</div>
  <div class="nav-links">
    <a href="#">Play</a>
    <a href="#">Puzzles</a>
    <a href="#">Leaderboard</a>
    <a href="#">Learn</a>
    <button class="login">Login</button>
  </div>
</nav>

<!-- Main Game Container -->
<div class="game-container">

  <div class="board-area">
    <div id="board" class="chessboard"></div>
  </div>

  <div class="side">

    <div id="blackTimer" class="timer">05:00</div>
    <div id="thinking" class="thinking-indicator"></div>

    <div id="moves" class="moves"></div>

    <div class="controls">
      <button class="undo" onclick="undoMove()" id="undoBtn">Undo</button>
      <button class="redo" onclick="redoMove()" id="redoBtn" disabled>Redo</button>
      <button class="resign" onclick="resign()">Resign</button>
    </div>

    <button class="flip" onclick="flipBoard()">Flip Board</button>
    <button class="pgn" onclick="exportPGN()">Copy PGN</button>

    <div id="whiteTimer" class="timer">05:00</div>

    <div id="status">White to move</div>

  </div>
</div>

<!-- Win Message Modal -->
<div id="winMessage">
  <div>
    <div id="winText"></div>
    <br>
    <button onclick="newGame()">New Game</button>
  </div>
</div>

<script>
// --- Configuration ---
const boardEl = document.getElementById("board");
const game = new Chess();
const statusEl = document.getElementById("status");
const movesDiv = document.getElementById("moves");
const thinkingEl = document.getElementById("thinking");

const whiteTimerEl = document.getElementById("whiteTimer");
const blackTimerEl = document.getElementById("blackTimer");
const undoBtn = document.getElementById("undoBtn");
const redoBtn = document.getElementById("redoBtn");

// --- State ---
let selected = null;
let legalMoves = [];
let flipped = false;
let lastMove = null;

let whiteTime = 300; // 5 minutes
let blackTime = 300;

let timerInterval = null;
let gameStarted = false;
let gameOver = false;

let aiColor = "b"; // AI plays Black
let aiThinking = false;
let stockfish = null;

// --- Move History for Undo/Redo ---
let moveHistory = [];
let redoStack = [];

// --- Piece Assets ---
const pieces = {
    wp: "https://upload.wikimedia.org/wikipedia/commons/4/45/Chess_plt45.svg",
    wr: "https://upload.wikimedia.org/wikipedia/commons/7/72/Chess_rlt45.svg",
    wn: "https://upload.wikimedia.org/wikipedia/commons/7/70/Chess_nlt45.svg",
    wb: "https://upload.wikimedia.org/wikipedia/commons/b/b1/Chess_blt45.svg",
    wq: "https://upload.wikimedia.org/wikipedia/commons/1/15/Chess_qlt45.svg",
    wk: "https://upload.wikimedia.org/wikipedia/commons/4/42/Chess_klt45.svg",
    bp: "https://upload.wikimedia.org/wikipedia/commons/c/c7/Chess_pdt45.svg",
    br: "https://upload.wikimedia.org/wikipedia/commons/f/ff/Chess_rdt45.svg",
    bn: "https://upload.wikimedia.org/wikipedia/commons/e/ef/Chess_ndt45.svg",
    bb: "https://upload.wikimedia.org/wikipedia/commons/9/98/Chess_bdt45.svg",
    bq: "https://upload.wikimedia.org/wikipedia/commons/4/47/Chess_qdt45.svg",
    bk: "https://upload.wikimedia.org/wikipedia/commons/f/f0/Chess_kdt45.svg"
};

// --- Stockfish Initialization (Blob workaround for CORS) ---
async function initStockfish() {
    try {
        const response = await fetch('https://cdnjs.cloudflare.com/ajax/libs/stockfish.js/10.0.0/stockfish.js');
        const text = await response.text();
        const blob = new Blob([text], { type: 'application/javascript' });
        const url = URL.createObjectURL(blob);
        stockfish = new Worker(url);
        
        stockfish.onmessage = function(event) {
            const line = event.data;
            
            if (line.startsWith("bestmove")) {
                const moveStr = line.split(" ")[1];
                if (moveStr) {
                    game.move({
                        from: moveStr.substring(0, 2),
                        to: moveStr.substring(2, 4),
                        promotion: "q"
                    });
                    lastMove = [moveStr.substring(0, 2), moveStr.substring(2, 4)];
                    aiThinking = false;
                    thinkingEl.textContent = "";
                    updateMoves();
                    drawBoard();
                    updateStatus();
                }
            }
        };
    } catch (e) {
        console.error("Failed to load Stockfish", e);
        thinkingEl.textContent = "AI unavailable";
    }
}

// --- Core Game Functions ---

function drawBoard() {
    boardEl.innerHTML = "";
    
    let ranks = [8, 7, 6, 5, 4, 3, 2, 1];
    let files = ["a", "b", "c", "d", "e", "f", "g", "h"];

    if (flipped) {
        ranks.reverse();
        files.reverse();
    }

    for (let r of ranks) {
        for (let f of files) {
            let coord = f + r;
            let square = document.createElement("div");
            
            let rIndex = ranks.indexOf(r);
            let cIndex = files.indexOf(f);
            
            square.className = "square " + ((rIndex + cIndex) % 2 ? "dark" : "light");
            square.dataset.square = coord;

            let piece = game.get(coord);
            if (piece) {
                let img = document.createElement("img");
                img.src = pieces[piece.color + piece.type];
                square.appendChild(img);
            }

            if (selected === coord) square.classList.add("selected");
            if (legalMoves.includes(coord)) square.classList.add("highlight");

            if (lastMove && (coord === lastMove[0] || coord === lastMove[1])) {
                square.style.backgroundColor = "rgba(46,204,113,0.3)";
            }

            square.onclick = handleClick;
            boardEl.appendChild(square);
        }
    }
}

function handleClick() {
    if (gameOver || aiThinking) return;

    let square = this.dataset.square;
    let piece = game.get(square);

    if (selected === null) {
        if (piece && piece.color === game.turn()) {
            selected = square;
            let moves = game.moves({ square: square, verbose: true });
            legalMoves = moves.map(m => m.to);
            drawBoard();
        }
        return;
    }

    let move = game.move({
        from: selected,

        promotion: "q"
    });
