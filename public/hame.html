<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NepChess | Play Online</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 50%, #16213e 100%);
            --sidebar-color: rgba(15, 15, 35, 0.95);
            --accent-green: #2ecc71;
            --text-white: #ffffff;
            --text-gray: #b0b0b0;
            --card-bg: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-white);
            display: flex;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        /* Sidebar Navigation */
        nav { 
            width: 220px; 
            background: var(--sidebar-color); 
            padding: 40px 20px; 
            border-right: 1px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(15px);
            flex-shrink: 0;
        }

        .logo {
            font-size: 26px;
            font-weight: 900;
            color: var(--accent-green);
            margin-bottom: 50px;
            text-align: center;
        }
        .logo span { color: white; }

        .nav-item { 
            color: var(--text-white); 
            text-decoration: none; 
            padding: 15px; 
            font-weight: 600; 
            border-radius: 12px;
            margin-bottom: 10px;
            transition: 0.3s;
            cursor: pointer;
        }
        
        .nav-item:hover { background: rgba(255, 255, 255, 0.1); }
        .nav-item.active { background: var(--accent-green); color: #0f0f23; }

        /* Main Game Lobby Area */
        main { 
            flex-grow: 1; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            position: relative;
        }

        .play-card { 
            width: 90%;
            max-width: 500px; 
            background: var(--card-bg); 
            padding: 40px; 
            border-radius: 30px; 
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
            text-align: center;
        }

        h1 { margin-bottom: 35px; font-weight: 800; font-size: 36px; letter-spacing: -1px; }
        h1 span { color: var(--accent-green); }

        .mode-list { display: flex; flex-direction: column; gap: 15px; text-align: left; }

        .mode-item {
            display: flex;
            align-items: center;
            background: rgba(255,255,255,0.03);
            padding: 20px;
            border-radius: 18px;
            cursor: pointer;
            transition: 0.2s;
            border: 2px solid transparent;
        }

        .mode-item:hover { background: rgba(255,255,255,0.07); transform: translateY(-2px); }

        .mode-item.selected {
            border-color: var(--accent-green);
            background: rgba(46, 204, 113, 0.12);
        }

        .icon { font-size: 36px; margin-right: 20px; }
        .details h3 { margin: 0; font-size: 18px; font-weight: 700; }
        .details p { margin-top: 4px; font-size: 13px; color: var(--text-gray); }

        /* Big Action Button */
        .big-play-btn {
            display: block;
            margin-top: 40px;
            background-color: var(--accent-green);
            color: #0f0f23;
            text-decoration: none;
            padding: 22px;
            border-radius: 40px;
            font-size: 22px;
            font-weight: 800;
            box-shadow: 0 10px 30px rgba(46, 204, 113, 0.4);
            transition: 0.3s;
            text-transform: uppercase;
            border: none;
            width: 100%;
            cursor: pointer;
        }

        .big-play-btn:hover { 
            transform: translateY(-4px); 
            box-shadow: 0 15px 40px rgba(46, 204, 113, 0.6); 
        }

        .big-play-btn:active { transform: translateY(0); }

    </style>
</head>
<body>

    <nav>
        <div class="logo"><span>♟</span> NepChess</div>
        <div class="nav-item active">Play</div>
        <div class="nav-item">Puzzles</div>
        <div class="nav-item">Leaderboard</div>
        <div class="nav-item">Learn</div>
    </nav>

    <main>
        <div class="play-card">
            <h1>New <span>Game</span></h1>
            
            <div class="mode-list">
                <div class="mode-item selected" onclick="selectMode('online.html', this, 'Play Online')">
                    <div class="icon">⚡</div>
                    <div class="details">
                        <h3>Play Online</h3>
                        <p>Real-time matchmaking</p>
                    </div>
                </div>

                <div class="mode-item" onclick="selectMode('computer.html', this, 'Play vs AI')">
                    <div class="icon">🤖</div>
                    <div class="details">
                        <h3>Computer</h3>
                        <p>Stockfish Engine</p>
                    </div>
                </div>

                <div class="mode-item" onclick="selectMode('friend.html', this, 'Challenge Friend')">
                    <div class="icon">🤝</div>
                    <div class="details">
                        <h3>Play a Friend</h3>
                        <p>Private game link</p>
                    </div>
                </div>

                <div class="mode-item" onclick="selectMode('local.html', this, 'Play Local')">
                    <div class="icon">🏠</div>
                    <div class="details">
                        <h3>Local Match</h3>
                        <p>Same computer mode</p>
                    </div>
                </div>
            </div>

            <button id="mainBtn" class="big-play-btn" onclick="go()">Play Online</button>
        </div>
    </main>

    <script>
        // Track the current link
        let targetUrl = 'online.html';

        function selectMode(url, element, text) {
            // Update destination
            targetUrl = url;
            
            // Update button UI
            document.getElementById('mainBtn').innerText = text;

            // Update card highlights
            document.querySelectorAll('.mode-item').forEach(item => {
                item.classList.remove('selected');
            });
            element.classList.add('selected');
        }

        function go() {
            // Go to the selected page
            window.location.href = targetUrl;
        }
    </script>

</body>
</html>
